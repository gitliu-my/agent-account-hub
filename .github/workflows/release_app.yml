name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install py2app
          python -m pip install -e .

      - name: Run tests
        run: python -m unittest tests.test_core tests.test_tray

      - name: Build app bundle
        run: python setup.py py2app

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Codex Account Hub.app" "dist/Codex.Account.Hub.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex Account Hub macOS app
          path: dist/Codex.Account.Hub.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Codex.Account.Hub.zip
