name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install py2app
          python -m pip install -e .

      - name: Run tests
        run: python -m unittest tests.test_core tests.test_providers tests.test_tray

      - name: Build app bundle
        run: python setup.py py2app

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Agent Account Hub.app" "dist/Agent.Account.Hub.zip"

      - name: Compute asset checksum
        id: asset
        run: |
          echo "sha256=$(shasum -a 256 'dist/Agent.Account.Hub.zip' | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agent Account Hub macOS app
          path: dist/Agent.Account.Hub.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Agent.Account.Hub.zip

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/') && secrets.HOMEBREW_TAP_GITHUB_TOKEN != ''
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAP_REPOSITORY: gitliu-my/homebrew-tap
          RELEASE_VERSION: ${{ github.ref_name }}
          ASSET_SHA256: ${{ steps.asset.outputs.sha256 }}
        run: |
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${TAP_REPOSITORY}.git" "$TAP_DIR"
          python scripts/update_homebrew_cask.py \
            --cask-file "$TAP_DIR/Casks/agent-account-hub.rb" \
            --version "${RELEASE_VERSION#v}" \
            --sha256 "$ASSET_SHA256"
          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            exit 0
          fi
          git add Casks/agent-account-hub.rb
          git commit -m "Update agent-account-hub to ${RELEASE_VERSION}"
          git push
